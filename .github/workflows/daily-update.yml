name: Daily Job Update

on:
  schedule:
    - cron: '0 6 * * *'  # 6 AM UTC daily
  workflow_dispatch:       # Manual trigger

jobs:
  update-jobs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Check unapplied job cap
        id: cap_check
        run: |
          python scripts/check_cap.py
          if [ -f data/dashboard_flags.json ]; then
            PAUSED=$(python -c "import json; print(json.load(open('data/dashboard_flags.json'))['paused'])")
            echo "paused=$PAUSED" >> $GITHUB_OUTPUT
          else
            echo "paused=False" >> $GITHUB_OUTPUT
          fi

      - name: Run job scraper
        if: steps.cap_check.outputs.paused != 'True'
        run: python scripts/scraper.py

      - name: Score jobs with Claude API
        if: steps.cap_check.outputs.paused != 'True'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/claude_scorer.py

      - name: Merge scored jobs into data
        if: steps.cap_check.outputs.paused != 'True'
        run: python scripts/update_data.py

      - name: Check for changes
        id: changes
        run: |
          git add data/
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Aswathy Ajaykumar"
          git config user.email "aswathyajaykumar0302@gmail.com"
          git commit -m "Auto-update: jobs scraped and scored $(date +%Y-%m-%d)"
          git push
